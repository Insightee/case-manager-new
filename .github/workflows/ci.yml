name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      STORAGE_PROVIDER: local
      APP_ENV: test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Docker/Railway dependency parity
        run: |
          python3 scripts/check_pyproject_requirements.py
          pip install --no-cache-dir .
          python3 -c "import boto3; import reportlab; import openpyxl"
      - name: Alembic single head
        run: |
          PYTHONPATH=.:alembic python3 -m alembic heads | tee /tmp/heads.txt
          test "$(grep -c '(head)' /tmp/heads.txt)" -eq 1
      - name: Production config guard tests
        run: python3 -m pytest app/tests/test_production_checks.py app/tests/test_refresh_token_storage.py -q --tb=short
      # Tests bootstrap DB in app/tests/conftest.py (migrate + seed per runner).
      - run: python3 -m pytest app/tests -q --tb=short

  frontend:
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: https://case-manager-new-production.up.railway.app
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      # npm ci fails on Linux when optional deps (rolldown/wasm) differ from the lock snapshot; install then verify build.
      - run: npm install --no-audit --no-fund
      - run: npm run build

  # Mirrors Vercel project insightes-projects/frontend (repo root + vercel.json).
  vercel-monorepo-build:
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: https://case-manager-new-production.up.railway.app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install (same as vercel.json)
        run: npm install --no-audit --no-fund --prefix frontend
      - name: Build (same as vercel.json)
        run: npm run build --prefix frontend
      - name: SPA output exists
        run: test -f frontend/dist/index.html

  contributor-guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Team workflow files present
        run: |
          test -f CONTRIBUTING.md
          test -f CHANGELOG.md
          test -f .github/pull_request_template.md
          test -f docs/TEAM_OWNERSHIP.md
          grep -q '^\## \[Unreleased\]' CHANGELOG.md
      - name: Fetch base branch for PR diff
        if: github.event_name == 'pull_request'
        run: git fetch origin "${{ github.base_ref }}" --depth=1
      - name: No secrets in PR diff
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: bash scripts/check_staged_secrets.sh --ci
      - name: Shell scripts syntax
        run: |
          chmod +x scripts/*.sh
          bash -n scripts/pre-push-check.sh
          bash -n scripts/pre-release-check.sh
          bash -n scripts/check_staged_secrets.sh
          bash -n scripts/run-ci-parity-checks.sh
