name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      STORAGE_PROVIDER: local
      APP_ENV: test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Alembic single head
        run: |
          PYTHONPATH=.:alembic python3 -m alembic heads | tee /tmp/heads.txt
          test "$(grep -c '(head)' /tmp/heads.txt)" -eq 1
      # Tests bootstrap DB in app/tests/conftest.py (migrate + seed per runner).
      - run: python3 -m pytest app/tests -q --tb=short

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      # npm ci fails on Linux when optional deps (rolldown/wasm) differ from the lock snapshot; install then verify build.
      - run: npm install --no-audit --no-fund
      - run: npm run build
