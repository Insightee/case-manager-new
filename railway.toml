# Monorepo: GitHub deploys from repo root; API lives in backend/
# Railway project: ead85fb6-1826-4eed-bad9-2513e89c4854 (see docs/RAILWAY_VERCEL.md)
[build]
builder = "DOCKERFILE"
# Repo-root context; copies from backend/ (see /Dockerfile). Do not use backend/Dockerfile here.
dockerfilePath = "Dockerfile"
watchPatterns = ["backend/**"]

[deploy]
# Use Dockerfile CMD (scripts/start-production.sh in image). Override only if needed.
healthcheckPath = "/health"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
